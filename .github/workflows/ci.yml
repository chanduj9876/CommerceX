name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ─────────────────────────────────────────────────────────────
  # Build & Test all modules
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 5

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Create test databases
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE commercex_users;"
          PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE commercex_products;"
          PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE commercex_orders;"
          PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE commercex_payments;"
          PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE commercex_shipping;"

      - name: Run unit tests (all modules)
        run: ./mvnw test -pl common-lib,user-service,product-service,order-service,payment-service,shipping-service -am -B

      - name: Package all modules (skip tests)
        run: ./mvnw package -pl common-lib,eureka-server,api-gateway,user-service,product-service,order-service,payment-service,shipping-service -am -DskipTests -B

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: "**/target/surefire-reports/*.xml"
          retention-days: 7

      - name: Upload JARs
        uses: actions/upload-artifact@v4
        with:
          name: service-jars
          path: "**/target/*.jar"
          retention-days: 3

  # ─────────────────────────────────────────────────────────────
  # Docker builds — only on main branch
  # ─────────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all images via docker-compose
        run: docker compose build --parallel

      - name: Verify images exist
        run: docker images --filter "reference=commercex/*" --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"
