# Logstash Configuration for CommerceX Microservices
# Receives logs from all services and forwards to Elasticsearch

input {
  # TCP input for JSON logs from services
  tcp {
    port => 5000
    codec => json_lines
  }

  # Beats input (if using Filebeat)
  beats {
    port => 5044
  }
}

filter {
  # Parse timestamp if present
  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601"]
    }
  }

  # Add common fields
  mutate {
    add_field => {
      "[@metadata][index_prefix]" => "commercex-logs"
    }
  }

  # Extract service name from logger or application name
  if [logger_name] {
    grok {
      match => { "logger_name" => "com\.commercex\.(?<service_module>[^\.]+)" }
    }
  }

  # Parse stack traces
  if [stack_trace] {
    mutate {
      gsub => [
        "stack_trace", "\n", " | ",
        "stack_trace", "\t", " "
      ]
    }
  }
}

output {
  # Send to Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "%{[@metadata][index_prefix]}-%{+YYYY.MM.dd}"
  }

  # Debug output to stdout (can be disabled in production)
  stdout {
    codec => rubydebug
  }
}
