# Test configuration — uses local PostgreSQL (commercex_test) and Memurai/Redis
spring.datasource.url=jdbc:postgresql://localhost:5432/commercex_test
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JWT (required by security auto-config)
jwt.secret=Y29tbWVyY2V4LXNlY3JldC1rZXktZm9yLWp3dC10b2tlbi1nZW5lcmF0aW9uLTEyMzQ1Njc4OQ==
jwt.expiration-ms=86400000

# Redis / Memurai (local)
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis
spring.cache.redis.time-to-live=600000

# RabbitMQ disabled for tests
spring.rabbitmq.host=localhost
spring.rabbitmq.port=0
spring.rabbitmq.listener.simple.auto-startup=false
