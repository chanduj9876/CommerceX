spring.application.name=commercex

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/commercex
spring.datasource.username=postgres
spring.datasource.password=postgres

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# JWT Configuration
jwt.secret=Y29tbWVyY2V4LXNlY3JldC1rZXktZm9yLWp3dC10b2tlbi1nZW5lcmF0aW9uLTEyMzQ1Njc4OQ==
jwt.expiration-ms=86400000

# RabbitMQ Configuration
# When RabbitMQ server is not running, the app falls back to direct in-memory event handling.
# To use RabbitMQ: install it (or run via Docker), then remove the auto-startup=false line.
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
#spring.rabbitmq.listener.simple.auto-startup=false

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis
spring.cache.redis.time-to-live=600000
